// Renders a lucide icon by name from the vendored lucide.icons node data
// (the same [tag, attrs] shape lucide-react turns into components) —
// no bundler/npm dependency needed. Usage: <Icon name="Menu" />
function Icon({ name, size = 20, strokeWidth = 2, className = '' }) {
  const node = window.lucide && window.lucide.icons[name];
  if (!node) return null;
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      strokeWidth={strokeWidth}
      strokeLinecap="round"
      strokeLinejoin="round"
      className={className}
    >
      {node.map((child, i) => e(child[0], { key: i, ...child[1] }))}
    </svg>
  );
}

// ---------- Hooks ----------

function useActiveSection(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) setActive(entry.target.id);
        });
      },
      { rootMargin: '-40% 0px -55% 0px' }
    );
    ids.forEach((id) => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, [ids]);
  return active;
}

function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setVisible(true);
          observer.unobserve(el);
        }
      },
      { threshold: 0.15 }
    );
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  return [ref, visible];
}

function useTheme() {
  const [theme, setTheme] = useState(() => document.documentElement.classList.contains('dark') ? 'dark' : 'light');

  useEffect(() => {
    document.documentElement.classList.toggle('dark', theme === 'dark');
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('theme', theme); } catch (err) {}
  }, [theme]);

  const toggle = () => setTheme((t) => (t === 'dark' ? 'light' : 'dark'));
  return [theme, toggle];
}

function ThemeToggle({ theme, onToggle, className = '' }) {
  const isDark = theme === 'dark';
  return (
    <button

      aria-label={isDark ? 'Switch to light mode' : 'Switch to dark mode'}
      className={"relative w-10 h-10 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200 hover:bg-slate-900/10 dark:hover:bg-white/10 active:scale-90 transition-all duration-200 " + className}
    >

        <Icon name="Sun" size={20} />
      </span>
      <span className={"absolute transition-all duration-500 " + (isDark ? 'opacity-100 rotate-0 scale-100' : 'opacity-0 rotate-90 scale-50')}>
        <Icon name="Moon" size={20} />
      </span>
    </button>
  );
}

function CountUp({ value, duration = 1600 }) {
  const [ref, visible] = useReveal();
  const target = parseInt(String(value).replace(/[^0-9]/g, ''), 10) || 0;
  const [display, setDisplay] = useState(0);

  useEffect(() => {
    if (!visible) return;
    let raf;
    let start = null;
    const step = (ts) => {
      if (start === null) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplay(Math.round(eased * target));
      if (progress < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [visible, target, duration]);

  return <span ref={ref} className="tabular-nums">{display}</span>;
}

function Reveal({ children, className = '', delay = 0 }) {
  const [ref, visible] = useReveal();
  return (
    <div
      ref={ref}
      className={className + ' transition-all duration-700 ease-out ' + (visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8')}
      style={{ transitionDelay: delay + 'ms' }}
    >
      {children}
    </div>
  );
}

          <Reveal delay={150} className="grid grid-cols-3 gap-6 mt-10">
            {PORTFOLIO_CONFIG.stats.map((s) => (
              <div key={s.label} className="text-center md:text-left transition-transform duration-300 hover:-translate-y-1 cursor-default">
                <p className="text-3xl font-extrabold text-slate-900 dark:text-white"><CountUp value={s.value} /></p>
                <p className="text-sm text-slate-400 dark:text-slate-500 mt-1">{s.label}</p>
              </div>
            ))}
          </Reveal>
        </div>
      </div>
    </section>
  );
}

function SkillBar({ skill, delay }) {
  const [ref, visible] = useReveal();
  return (
    <div
      ref={ref}
      className={"transition-all duration-700 ease-out " + (visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8')}
      style={{ transitionDelay: delay + 'ms' }}
    >
      <div className="flex items-center justify-between mb-2">
        <span className="text-sm font-semibold text-slate-700 dark:text-slate-200">{skill.name}</span>
        <span className={"text-sm text-slate-400 dark:text-slate-500 transition-all duration-500 " + (visible ? 'opacity-100' : 'opacity-0')} style={{ transitionDelay: (delay + 500) + 'ms' }}>
          {skill.level}%
        </span>
      </div>
      <div className="h-2 rounded-full bg-slate-900/5 dark:bg-white/5 overflow-hidden">
        <div
          className="relative h-full rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all ease-out"
          style={{ width: visible ? skill.level + '%' : '0%', transitionDuration: '1200ms', transitionDelay: delay + 'ms' }}
        >
          <div className="absolute inset-0 shimmer-bar animate-shimmer"></div>
        </div>
      </div>
    </div>
  );
}

function Skills() {
  return (
    <section id="skills" className="py-28 px-6 bg-slate-900/[0.02] dark:bg-white/[0.02]">
      <div className="max-w-4xl mx-auto">
        <SectionHeading
          eyebrow="Skills"
          title="What I work with"
          subtitle="A toolkit refined over years of building production interfaces."
        />
        <div className="grid sm:grid-cols-2 gap-x-12 gap-y-8">
          {SKILLS.map((skill, i) => (
            <SkillBar key={skill.name} skill={skill} delay={i * 80} />
          ))}
        </div>
      </div>
    </section>
  );
}

function Projects() {
  return (
    <section id="projects" className="py-28 px-6">
      <div className="max-w-6xl mx-auto">
        <SectionHeading
          eyebrow="Portfolio"
          title="Selected projects"
          subtitle="A few things I've designed, built, and shipped recently."
        />
        <div className="grid sm:grid-cols-2 gap-8">
          {PROJECTS.map((p, i) => (
            <Reveal key={p.title} delay={i * 100}>
              <div className="group relative rounded-3xl p-[1.5px] h-full overflow-hidden transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-accent/20">
                <div className="absolute -inset-[50%] bg-[conic-gradient(from_0deg,transparent_0%,#6366f1_12%,#a855f7_25%,#ec4899_37%,transparent_50%,transparent_100%)] animate-spin-slow opacity-60 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div className="relative rounded-3xl glass bg-white/95 dark:bg-[#0f0f1a]/95 p-8 h-full overflow-hidden">
                <div className={"absolute -top-16 -right-16 w-40 h-40 rounded-full bg-gradient-to-br " + p.color + " opacity-20 blur-2xl group-hover:opacity-50 group-hover:scale-125 transition-all duration-500"}></div>
                <div className="relative">
                  <div className="flex items-start justify-between mb-6">
                    <div className={"w-12 h-12 rounded-xl bg-gradient-to-br " + p.color + " flex items-center justify-center text-white font-bold transition-transform duration-300 group-hover:rotate-6 group-hover:scale-110 shadow-lg"}>
                      {p.title.charAt(0)}
                    </div>
                    {p.href && (
                      <a
                        href={p.href}
                        target="_blank"
                        rel="noopener noreferrer"
                        aria-label={"Visit " + p.title}
                        className="text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition-all duration-300 hover:scale-125 hover:rotate-45"
                      >
                        <Icon name="ArrowUpRight" size={20} />
                      </a>
                    )}
                  </div>
                  <h3 className="text-xl font-bold text-slate-900 dark:text-white mb-2 transition-colors group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-indigo-300 group-hover:to-purple-300">{p.title}</h3>
                  <p className="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-6">{p.desc}</p>
                  <div className="flex flex-wrap gap-2">
                    {p.tags.map((t, ti) => (
                      <span
                        key={t}
                        className="text-xs font-medium px-3 py-1 rounded-full bg-slate-900/5 dark:bg-white/5 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:bg-slate-900/10 dark:hover:bg-white/10 hover:-translate-y-0.5"
                        style={{ transitionDelay: ti * 30 + 'ms' }}
                      >
                        {t}
                      </span>
                    ))}
                  </div>
                </div>
                </div>
              </div>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );
}

function Experience() {
  return (
    <section id="experience" className="py-28 px-6 bg-slate-900/[0.02] dark:bg-white/[0.02]">
      <div className="max-w-3xl mx-auto">
        <SectionHeading eyebrow="Career" title="Where I've worked" />
        <div className="relative border-l border-slate-900/10 dark:border-white/10 ml-3">
          {EXPERIENCE.map((job, i) => (
            <Reveal key={job.role + job.company} delay={i * 120} className="group relative pl-10 pb-12 last:pb-0">
              <span className="absolute left-0 top-1 -translate-x-1/2 w-4 h-4 rounded-full bg-accent ring-4 ring-white dark:ring-[#0b0b12] transition-transform duration-300 group-hover:scale-125">
                <span className="absolute inset-0 rounded-full bg-accent animate-ping opacity-75"></span>
              </span>
              <p className="text-sm text-accent-light font-semibold mb-1">{job.period}</p>
              <h3 className="text-lg font-bold text-slate-900 dark:text-white transition-transform duration-300 group-hover:translate-x-1">{job.role} · {job.company}</h3>
              <p className="text-slate-500 dark:text-slate-400 mt-2 text-sm leading-relaxed">{job.desc}</p>
            </Reveal>
          ))}
        </div>
      </div>
    </section>

function Contact() {
  const [form, setForm] = useState({ name: '', email: '', message: '' });
  const [sent, setSent] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setSent(true);
  };

  return (
    <section id="contact" className="py-28 px-6">
      <div className="max-w-3xl mx-auto">
        <SectionHeading
          eyebrow="Contact"
          title="Let's build something great"
          subtitle="Have a project in mind? Send a message and I'll get back to you within a day."
        />
        <Reveal>
          {sent ? (
            <div className="glass rounded-2xl p-10 text-center animate-pop-in">
              <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-emerald-400/10 flex items-center justify-center animate-pop-in" style={{ animationDelay: '100ms' }}>
                <Icon name="Check" size={28} className="text-emerald-400" />
              </div>
              <p className="text-2xl font-bold text-slate-900 dark:text-white mb-2">Thanks, {form.name || 'friend'}!</p>
              <p className="text-slate-500 dark:text-slate-400">This is a prototype, so nothing was actually sent — but in production this form would reach my inbox.</p>
            </div>
          ) : (
            <form onSubmit={handleSubmit} className="glass rounded-2xl p-8 sm:p-10 space-y-6">
              <div className="grid sm:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">Name</label>
                  <input
                    required
                    type="text"
                    value={form.name}
                    onChange={(e) => setForm({ ...form, name: e.target.value })}
                    className="w-full rounded-xl bg-slate-900/5 dark:bg-white/5 border border-slate-900/10 dark:border-white/10 px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent-light focus:-translate-y-0.5"
                    placeholder="Jane Doe"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">Email</label>
                  <input
                    required
                    type="email"
                    value={form.email}
                    onChange={(e) => setForm({ ...form, email: e.target.value })}
                    className="w-full rounded-xl bg-slate-900/5 dark:bg-white/5 border border-slate-900/10 dark:border-white/10 px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent-light focus:-translate-y-0.5"
                    placeholder="jane@example.com"
                  />
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">Message</label>
                <textarea
                  required
                  rows="5"
                  value={form.message}
                  onChange={(e) => setForm({ ...form, message: e.target.value })}
                  className="w-full rounded-xl bg-slate-900/5 dark:bg-white/5 border border-slate-900/10 dark:border-white/10 px-4 py-3 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent-light focus:-translate-y-0.5 resize-none"
                  placeholder="Tell me about your project..."
                ></textarea>
              </div>
              <button
                type="submit"
                className="group w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-3 rounded-full bg-accent hover:bg-accent-light transition-all duration-300 text-white font-semibold shadow-lg shadow-accent/30 hover:shadow-accent/50 hover:-translate-y-0.5 active:translate-y-0 active:scale-95"
              >
                <Icon name="Send" size={18} className="transition-transform duration-300 group-hover:translate-x-1 group-hover:-translate-y-0.5" />
                Send message
              </button>
            </form>
          )}
        </Reveal>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer className="border-t border-slate-900/5 dark:border-white/5 py-10 px-6">
      <div className="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-6">
        <p className="text-slate-400 dark:text-slate-500 text-sm">© 2026 {PORTFOLIO_CONFIG.name}. All rights reserved.</p>
        <div className="flex gap-5">
          {PORTFOLIO_CONFIG.socials.map((s) => (
            <a key={s.label} href={s.href} aria-label={s.label} className="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all duration-300 hover:scale-125 hover:-translate-y-1">
              <BrandIcon brand={s.brand} size={20} />
            </a>
          ))}

  );
}

      <Experience />
      <Contact />
      <Footer />
