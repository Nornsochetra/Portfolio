name: Deploy to UAT

on:
  push:
    branches: [uat]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-uat.yml"

# Avoid two deploys racing if pushes land close together.
concurrency:
  group: deploy-uat
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name (GHCR requires lowercase)
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:uat
            ${{ steps.image.outputs.name }}:uat-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into UAT server and redeploy container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UAT_SSH_HOST }}
          username: ${{ secrets.UAT_SSH_USER }}
          key: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
          port: ${{ secrets.UAT_SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ needs.build-and-push.outputs.image }}:uat"

            # Only needed if the ghcr.io package is private.
            # Skip this login step if you make the package public instead.
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            docker pull "$IMAGE"
            docker stop portfolio-uat || true
            docker rm portfolio-uat || true
            docker run -d \
              --name portfolio-uat \
              --restart unless-stopped \
              -p 3000:3000 \
              "$IMAGE"
            docker image prune -f
