name: Deploy to UAT

on:
  push:
    branches: [uat]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-uat.yml"
  workflow_dispatch: {}

# Avoid two deploys racing if pushes land close together.
concurrency:
  group: deploy-uat
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restart with pm2
        run: |
          pm2 describe portfolio-uat > /dev/null 2>&1 \
            && pm2 reload portfolio-uat --update-env \
            || pm2 start npm --name portfolio-uat -- start
          pm2 save
